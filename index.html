<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMKM.BGS.UZ</title>
    <style>
        /* Umumiy sozlamalar */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Chiroyli gradiyent fon */
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a40 100%);
            overflow: hidden;
            color: white;
        }

        /* Konteyner va matn dizayni */
        .content {
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 4rem; /* Katta hajm */
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0;
            /* Matn soyasi va animatsiya uchun */
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1.5s ease-out;
        }

        /* Sayt manzili qismini ajratib ko'rsatish */
        .highlight {
            background: linear-gradient(to right, #00dbde, #fc00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Kirish animatsiyasi */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobil qurilmalar uchun moslashuvchanlik */
        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Hello, this is <span class="highlight">tmkm.bgs.uz</span> page</h1>
    </div>

</body>
</html>
